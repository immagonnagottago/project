<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0c0c0c;
      color: #b8b8b8;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }
    .shell { display: flex; flex-direction: column; height: 100vh; }
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    .line { padding: 1px 0; word-break: break-word; }
    .inputbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #1e1e1e;
      padding: 0 14px;
      height: 36px;
    }
    .prompt { color: #444; user-select: none; }
    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      caret-color: #777;
    }
    #cmd::placeholder { color: #2a2a2a; }
  </style>
</head>
<body>
<div class="shell">
  <main class="feed" id="feed"></main>
  <footer class="inputbar">
    <span class="prompt">&gt;</span>
    <input id="cmd" type="text" placeholder="enter command…" autocomplete="off" spellcheck="false" />
  </footer>
</div>
<script src="tags.js"></script>
<script src="nodes.js"></script>
<script src="perception.js"></script>
<script>
  const feed  = document.getElementById('feed');
  const input = document.getElementById('cmd');

  function appendLine(html) {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = html;
    feed.appendChild(line);
    feed.scrollTop = feed.scrollHeight;
  }

  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = input.value.trim();
    if (!val) return;
    appendLine(val);
    // TODO: send val to command parser
    input.value = '';
  });

  input.focus();
  appendLine(describe());
</script>
</body>
</html>
